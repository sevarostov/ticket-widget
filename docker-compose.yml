services:
  
  nginx:
    container_name: nginx
    image: nginx:stable-alpine
    ports:
      - '80:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - app-network
      
  php:
    container_name: php
    image: php:latest
    expose:
      - 9000
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - app-network
  
  mysql:
    container_name: mysql
    image: mysql
    command: ['mysqld',
              '--disable-log-bin',
              '--skip-log-bin',
              '--binlog-expire-logs-seconds=259200'
    ]
    environment:
      MYSQL_DATABASE: ${DOCKER_DATABASE}
      MYSQL_USER: ${DOCKER_MYSQL_USER}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - ./docker/mysql:/var/lib/mysql
      - .:/var/www/html
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge
